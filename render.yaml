services:
  # API Backend Service
  - type: web
    name: legalsahayak-api-us
    env: python
    region: oregon # Change as needed
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PDF_WORKER_URL
        fromService:
          type: web
          name: legalsahayak-pdf-worker
          envVarKey: RENDER_EXTERNAL_URL

  # PDF Worker Service
  - type: web
    name: legalsahayak-pdf-worker-us
    env: docker
    region: oregon # Change as needed
    plan: free
    rootDir: pdf-worker
